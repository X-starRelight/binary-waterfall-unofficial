name: BW_U 跨平台构建

on:
  push:
    branches: [main, develop]
    tags: ['v*', 'test_v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ═══════════════════════════════════════════════════════════════
  #  桌面平台构建 (Windows / Linux / macOS × AMD64 / ARM64)
  # ═══════════════════════════════════════════════════════════════
  build-desktop:
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows ──
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            lib_name: bw_accelerator.dll
            artifact_lib_name: bw_accelerator.dll
            artifact_name: binary_waterfall_unofficial_windows_x64.zip
          - os: windows-latest
            target: i686-pc-windows-msvc
            lib_name: bw_accelerator.dll
            artifact_lib_name: bw_accelerator_x86.dll
            artifact_name: binary_waterfall_unofficial_windows_x86.zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            lib_name: bw_accelerator.dll
            artifact_lib_name: bw_accelerator_arm64.dll
            artifact_name: binary_waterfall_unofficial_windows_arm64.zip

          # ── Linux ──
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib_name: libbw_accelerator.so
            artifact_lib_name: bw_accelerator.so
            artifact_name: binary_waterfall_unofficial_linux_x64.zip
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            lib_name: libbw_accelerator.so
            artifact_lib_name: bw_accelerator_arm64.so
            artifact_name: binary_waterfall_unofficial_linux_arm64.zip
            cross: true

          # ── macOS ──
          - os: macos-latest
            target: x86_64-apple-darwin
            lib_name: libbw_accelerator.dylib
            artifact_lib_name: bw_accelerator.dylib
            artifact_name: binary_waterfall_unofficial_macos_x64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            lib_name: libbw_accelerator.dylib
            artifact_lib_name: bw_accelerator_arm64.dylib
            artifact_name: binary_waterfall_unofficial_macos_arm64.zip

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.artifact_name }} (${{ matrix.target }})

    steps:
      - name: 📥 检出代码
        uses: actions/checkout@v4

      - name: 🦀 安装 Rust 工具链
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: 🔧 安装 CMake 和 Clang (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake clang llvm

      - name: 🔧 安装 CMake 和 Clang (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install cmake llvm || true
          echo "$(brew --prefix llvm)/bin" >> $GITHUB_PATH

      - name: 🔧 安装 CMake 和 LLVM (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install cmake llvm -y
          echo "C:\Program Files\LLVM\bin" >> $env:GITHUB_PATH

      - name: 🔧 安装 autotools (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y autoconf automake libtool make

      - name: 🔧 安装 autotools (MacOS)
        if: runner.os == 'macOS'
        run: brew install autoconf automake libtool make

      - name: 安装 Visual Studio 2022 Build Tools
        if: runner.os == 'Windows' && matrix.target == 'aarch64-pc-windows-msvc'
        run: |
          choco install visualstudio2022buildtools -y --params "--quiet --norestart"

      - name: 安装 ARM64 MSVC 工具链
        if: runner.os == 'Windows' && matrix.target == 'aarch64-pc-windows-msvc'
        run: |
          choco install visualstudio2022-workload-vctools --package-parameters "--add Microsoft.VisualStudio.Component.VC.Tools.ARM64 --quiet --norestart"

      - name: 📦 缓存 Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-${{ matrix.target }}-

      - name: 🔧 安装 cross (ARM64 Linux 交叉编译)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: 🏗️ 编译 Rust 动态库 (原生)
        if: "!matrix.cross"
        run: cargo build --release --target ${{ matrix.target }}

      - name: 🏗️ 编译 Rust 动态库 (交叉编译)
        if: matrix.cross
        run: cross build --release --target ${{ matrix.target }}

      - name: 📋 重命名动态库产物
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release/${{ matrix.lib_name }}"
          DST="${{ matrix.artifact_lib_name }}"
          cp "$SRC" "$DST"
          echo "动态库产物: $DST ($(du -h "$DST" | cut -f1))"

      - name: 🔧 安装 UPX (Windows x64/x86)
        if: runner.os == 'Windows' && (matrix.target == 'x86_64-pc-windows-msvc' || matrix.target == 'i686-pc-windows-msvc')
        run: choco install upx

      - name: 📦 使用 UPX 压缩 Windows x64/x86 动态库
        if: runner.os == 'Windows' && (matrix.target == 'x86_64-pc-windows-msvc' || matrix.target == 'i686-pc-windows-msvc')
        run: upx --best --lzma ${{ matrix.artifact_lib_name }}

      - name: 🔧 安装 LLVM (Windows ARM64)
        if: runner.os == 'Windows' && matrix.target == 'aarch64-pc-windows-msvc'
        run: choco install llvm

      - name: 🔪 使用 llvm-strip 减小 Windows ARM64 动态库体积
        if: runner.os == 'Windows' && matrix.target == 'aarch64-pc-windows-msvc'
        run: llvm-strip ${{ matrix.artifact_lib_name }}

      - name: 📦 使用 UPX 5.1.1 压缩 Linux 动态库
        if: runner.os == 'Linux'
        uses: crazy-max/ghaction-upx@v3
        with:
          version: v5.1.1
          files: ${{ matrix.artifact_lib_name }}
          args: --best --lzma

      - name: 🔪 使用 strip -S 减小 macOS 动态库体积（仅剥离调试符号）
        if: runner.os == 'macOS'
        run: strip -S ${{ matrix.artifact_lib_name }}

      # ═══════════════════════════════════════════════════════════
      #  Python + Nuitka 打包
      # ═══════════════════════════════════════════════════════════

      - name: 🐍 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: 📦 安装 uv
        run: pip install uv

      - name: 📦 缓存 uv
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/uv
            .venv
          key: ${{ runner.os }}-uv-${{ hashFiles('uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: 📦 安装 Python 依赖
        run: |
          uv sync
          uv sync --group build

      - name: 🏗️ 使用 Nuitka 打包 (自动编译 Rust)
        if: "!matrix.cross"
        shell: bash
        run: uv run python build.py

      - name: 🏗️ 使用 Nuitka 打包 (交叉编译，使用预编译库)
        if: matrix.cross
        shell: bash
        run: uv run python build.py --lib-path=${{ matrix.artifact_lib_name }}

      - name: 📦 压缩 Nuitka 产物为 zip
        shell: bash
        run: |
          DIST_DIR="build/binary_waterfall_unofficial.dist"
          if [ -d "$DIST_DIR" ]; then
            zip -r "${{ matrix.artifact_name }}" "$DIST_DIR"
            echo "产物: ${{ matrix.artifact_name }} ($(du -h "${{ matrix.artifact_name }}" | cut -f1))"
          else
            echo "❌ Nuitka 产物目录不存在: $DIST_DIR"
            exit 1
          fi

      - name: 📤 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          retention-days: 30
